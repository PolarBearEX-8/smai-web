<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#05086e" />
    <link rel="icon" type="image/png" href="%BASE_URL%Logo%20only.png" />
    <title>หน้าแรก | S-MAI</title>
    <script>
      // Apply the saved theme before first paint, otherwise dark-mode
      // visitors get a white flash while React boots.
      (function () {
        try {
          var stored = localStorage.getItem('smai-theme');
          var dark = stored
            ? stored === 'dark'
            : window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (dark) {
            document.documentElement.classList.add('dark');
            var meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute('content', '#080b2e');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
